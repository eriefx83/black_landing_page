    <script>
      const root = document.documentElement;
      const langButton = document.getElementById("languageButton");
      const langMenu = document.getElementById("languageMenu");
      const themeButton = document.getElementById("themeButton");
      const toast = document.getElementById("toast");

      function getCookie(name) {
        const match = document.cookie.match(new RegExp("(^| )" + name + "=([^;]+)"));
        return match ? decodeURIComponent(match[2]) : "";
      }

      window.sendCapiEvent = function(eventName, eventId) {
        const payload = {
          event_name: eventName,
          event_id: eventId,
          event_source_url: window.location.href,
          fbp: getCookie("_fbp"),
          fbc: getCookie("_fbc")
        };
        const body = JSON.stringify(payload);

        if (navigator.sendBeacon) {
          navigator.sendBeacon("capi.php", new Blob([body], { type: "application/json" }));
          return;
        }

        fetch("capi.php", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body,
          keepalive: true
        }).catch(() => {});
      };

      window.sendCapiEvent("PageView", window.__pageViewEventId);

      langButton.addEventListener("click", () => {
        const open = langMenu.classList.toggle("open");
        langButton.setAttribute("aria-expanded", String(open));
      });

      langMenu.addEventListener("click", (event) => {
        const item = event.target.closest("button");
        if (!item) return;
        langButton.querySelector("span").textContent = item.textContent === "English" ? "English" : "Indonesian";
        langMenu.classList.remove("open");
        langButton.setAttribute("aria-expanded", "false");
      });

      themeButton.addEventListener("click", () => {
        root.classList.toggle("dark");
      });

      document.querySelectorAll(".share-button").forEach((button) => {
        button.addEventListener("click", async () => {
          const shareData = {
            title: "Blackcode",
            text: "Trader Malas Entry",
            url: "https://a689.link/en"
          };
          try {
            if (navigator.share) {
              await navigator.share(shareData);
              return;
            }
            await navigator.clipboard.writeText(shareData.url);
          } catch (error) {
            try { await navigator.clipboard.writeText(shareData.url); } catch (_) {}
          }
          toast.classList.add("show");
          window.setTimeout(() => toast.classList.remove("show"), 1600);
        });
      });

      document.querySelectorAll("[data-pixel-event]").forEach((link) => {
        link.addEventListener("click", () => {
          const eventName = link.dataset.pixelEvent;
          const eventId = eventName + "_" + Date.now() + "_" + Math.random().toString(36).slice(2);
          const contentName = link.textContent.trim().replace(/\s+/g, " ");
          if (typeof window.fbq === "function") {
            window.fbq("track", eventName, {
              content_name: contentName
            }, { eventID: eventId });
          }
          window.sendCapiEvent(eventName, eventId);
        });
      });

      document.addEventListener("click", (event) => {
        if (!langMenu.contains(event.target) && !langButton.contains(event.target)) {
          langMenu.classList.remove("open");
          langButton.setAttribute("aria-expanded", "false");
        }
      });
